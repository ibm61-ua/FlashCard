{% extends 'base.html' %}

{% block content %}
<div class="header-section">
    <h1>Editar Flashcard</h1>
    <a href="{{ url_for('syllabus_view', syllabus_id=syllabus.id) }}" class="back-link">← Volver al Temario</a>
</div>

<div class="action-bar glassmorphism">
    <form action="{{ url_for('edit_flashcard', syllabus_id=syllabus.id, flashcard_id=flashcard.id) }}" method="POST" class="add-flashcard-form">
        <label style="color: white; font-weight: bold; margin-bottom: 0.5rem;">Pregunta</label>
        <textarea name="question" required class="input-textarea" style="min-height: 150px;">{{ flashcard.question }}</textarea>
        
        <label style="color: white; font-weight: bold; margin-bottom: 0.5rem;">Respuesta</label>
        <textarea name="answer" required class="input-textarea" style="min-height: 250px;">{{ flashcard.answer }}</textarea>
        
        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
    </form>
</div>
{% endblock %}
